  # 【教育类事件】- 18个
  # ============================================================
  education:
    description: 教育相关事件
    events:
      - id: enter_primary_school
        name: 进入小学
        age_range: [6, 8]
        weight: 1.0
        description: "开始接受学校教育"
        outcomes:
          education_level: [+1, +1]

      - id: primary_school_graduation
        name: 小学毕业
        age_range: [12, 14]
        weight: 1.0
        description: "完成小学教育"
        outcomes:
          education_level: [+1, +1]

      - id: enter_middle_school
        name: 进入初中
        age_range: [12, 14]
        weight: 1.0
        description: "进入初中阶段学习"
        outcomes:
          education_level: [+1, +1]

      - id: middle_school_graduation
        name: 初中毕业
        age_range: [15, 16]
        weight: 1.0
        description: "完成九年义务教育"
        outcomes:
          education_level: [+1, +1]

      - id: enter_high_school
        name: 进入高中
        age_range: [15, 18]
