        age_range: [18, 22]
        weight: 0.95
        description: "参加大学入学考试"
        outcomes:
          stress_level: [+0.3, +0.5]

      - id: college_enrollment
        name: 收到大学录取通知书
        age_range: [18, 23]
        weight: 0.7
        description: "考上大学"
        outcomes:
          education_level: [+2, +2]
          cultural_capital: [+0.2, +0.4]

      - id: college_dropout
        name: 大学辍学
        age_range: [19, 24]
        weight: 0.1
        description: "在大学期间辍学"
        outcomes:
          education_level: [-1, -1]
          field_pressure: [+0.2, +0.3]

      - id: college_graduation
        name: 大学毕业
        age_range: [22, 26]
        weight: 1.0
