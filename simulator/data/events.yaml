# 社会学人生模拟器 - 人生事件模板库（100事件版）
# 每个事件有严格的年龄范围，按社会规则生成

life_events:
  # ============================================================
  # 【教育类事件】- 18个
  # ============================================================
  education:
    description: 教育相关事件
    events:
      - id: enter_primary_school
        name: 进入小学
        age_range: [6, 8]
        weight: 1.0
        description: "开始接受学校教育"
        outcomes:
          education_level: [+1, +1]

      - id: primary_school_graduation
        name: 小学毕业
        age_range: [12, 14]
        weight: 1.0
        description: "完成小学教育"
        outcomes:
          education_level: [+1, +1]

      - id: enter_middle_school
        name: 进入初中
        age_range: [12, 14]
        weight: 1.0
        description: "进入初中阶段学习"
        outcomes:
          education_level: [+1, +1]

      - id: middle_school_graduation
        name: 初中毕业
        age_range: [15, 16]
        weight: 1.0
        description: "完成九年义务教育"
        outcomes:
          education_level: [+1, +1]

      - id: enter_high_school
        name: 进入高中
        age_range: [15, 18]
        weight: 0.8
        description: "进入普通高中或职业高中"
        outcomes:
          education_level: [+1, +1]

      - id: high_school_graduation
        name: 高中毕业
        age_range: [18, 21]
        weight: 0.9
        description: "完成高中学业"
        outcomes:
          education_level: [+1, +1]

      - id: take_college_entrance_exam
        name: 参加高考
        age_range: [18, 22]
        weight: 0.95
        description: "参加大学入学考试"
        outcomes:
          stress_level: [+0.3, +0.5]

      - id: college_enrollment
        name: 收到大学录取通知书
        age_range: [18, 23]
        weight: 0.7
        description: "考上大学"
        outcomes:
          education_level: [+2, +2]
          cultural_capital: [+0.2, +0.4]

      - id: college_dropout
        name: 大学辍学
        age_range: [19, 24]
        weight: 0.1
        description: "在大学期间辍学"
        outcomes:
          education_level: [-1, -1]
          field_pressure: [+0.2, +0.3]

      - id: college_graduation
        name: 大学毕业
        age_range: [22, 26]
        weight: 1.0
        description: "获得大学学位"
        outcomes:
          education_level: [+0, +0]
          cultural_capital: [+0.1, +0.2]

      - id: enter_graduate_school
        name: 继续深造（考研）
        age_range: [22, 28]
        weight: 0.3
        description: "考取研究生"
        outcomes:
          education_level: [+1, +2]
          cultural_capital: [+0.2, +0.3]

      - id: graduate_graduation
        name: 研究生毕业
        age_range: [24, 32]
        weight: 0.95
        description: "获得硕士/博士学位"
        outcomes:
          education_level: [+0, +0]
          cultural_capital: [+0.2, +0.3]

      - id: vocational_training
        name: 参加职业培训
        age_range: [16, 30]
        weight: 0.4
        description: "学习职业技能"
        outcomes:
          cultural_capital: [+0.1, +0.2]

      - id: adult_education
        name: 成人教育/继续教育
        age_range: [22, 45]
        weight: 0.25
        description: "参加成人教育提升学历"
        outcomes:
          education_level: [+1, +2]
          cultural_capital: [+0.1, +0.2]

      - id: study_abroad
        name: 留学海外
        age_range: [18, 28]
        weight: 0.15
        description: "到国外留学"
        outcomes:
          education_level: [+1, +3]
          cultural_capital: [+0.3, +0.5]
          stranger_status: [+0.2, +0.3]

      - id: educational_failure
        name: 升学失败/复读
        age_range: [15, 22]
        weight: 0.2
        description: "考试失利，需要复读"
        outcomes:
          stress_level: [+0.2, +0.4]
          field_pressure: [+0.2, +0.3]

      - id: certification_exam
        name: 通过职业资格考试
        age_range: [22, 45]
        weight: 0.35
        description: "考取职业资格证书"
        outcomes:
          cultural_capital: [+0.2, +0.3]
